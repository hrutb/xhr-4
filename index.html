                                 <option value="9">9</option>
                                 <option value="10">10</option>

                            </div>

                            <button class="btn btn-block btn-outline-primary button" id="addPost">Add Post</button>
                            <button class="btn btn-block btn-outline-primary d-none" type="button" id="updatePost">Update Post</button>

                        </form>
